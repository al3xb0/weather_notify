name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: weather
          POSTGRES_PASSWORD: weather
          POSTGRES_DB: weather_notify
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U weather -d weather_notify"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://weather:weather@localhost:5432/weather_notify?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-0123456789-abcdefghij
      JWT_REFRESH_SECRET: ci-refresh-secret-0123456789-abcdefghij

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Build all apps
        run: npm run build:all

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e
