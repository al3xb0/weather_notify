services:
  postgres:
    image: postgres:16-alpine
    container_name: wn_postgres
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
      POSTGRES_DB: weather_notify
    ports:
      # Bound to loopback only — reachable for local tooling, never from the
      # public interface. Services talk to it over the internal compose network.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather -d weather_notify"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wn_redis
    restart: unless-stopped
    mem_limit: 256m
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: wn_rabbitmq
    restart: unless-stopped
    mem_limit: 512m
    environment:
      RABBITMQ_DEFAULT_USER: weather
      RABBITMQ_DEFAULT_PASS: weather
    ports:
      - "127.0.0.1:5672:5672"
      # Management UI is dev-only — do NOT publish it in production.
      # - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  core-api:
    build:
      context: .
      args:
        APP: core-api
    container_name: wn_core_api
    restart: unless-stopped
    mem_limit: 512m
    env_file: .env
    environment:
      DATABASE_URL: postgresql://weather:weather@postgres:5432/weather_notify?schema=public
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://weather:weather@rabbitmq:5672
    command: sh -c "npx prisma migrate deploy && node dist/apps/core-api/main"
    ports:
      # Loopback only — exposed to the internet through the Caddy reverse proxy
      # (TLS) in production, never directly. Use "3000:3000" for plain local dev.
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  watcher:
    build:
      context: .
      args:
        APP: watcher
    container_name: wn_watcher
    restart: unless-stopped
    mem_limit: 384m
    env_file: .env
    environment:
      DATABASE_URL: postgresql://weather:weather@postgres:5432/weather_notify?schema=public
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://weather:weather@rabbitmq:5672
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      core-api:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  notifier:
    build:
      context: .
      args:
        APP: notifier
    container_name: wn_notifier
    restart: unless-stopped
    mem_limit: 384m
    env_file: .env
    environment:
      DATABASE_URL: postgresql://weather:weather@postgres:5432/weather_notify?schema=public
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://weather:weather@rabbitmq:5672
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
